<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Hume Changelog</title>
    <link rel="stylesheet" href="sakura.css">
</head>
<body>
    <h1>Hume Changelog</h1>
    <ul id="changelog">
    </ul>
    <script>
        const modelName = 'Hume';
        fetch('firmware.json')
            .then(response => response.json())
            .then(data => {
                const versions = data.filter(item => item.model === modelName);
                const ul = document.getElementById('changelog');
                versions.forEach(version => {
                    const li = document.createElement('li');
                    const h2 = document.createElement('h2');
                    h2.textContent = version.name;
                    const p = document.createElement('p');
                    p.innerHTML = version.description.replace(/\n/g, '<br>');
                    li.appendChild(h2);
                    li.appendChild(p);
                    ul.appendChild(li);
                });
            })
            .catch(error => console.error('Error loading JSON:', error));
    </script>
</body>
</html>
